apiVersion: v1
kind: Namespace
metadata:
  name: three-tier-app
  version: v1
  description: Namespace for the three-tier application
  labels:
    app.kubernetes.io/part-of: three-tier-app
  
---
# In production, use External Secrets Operator or Sealed Secrets.

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app

    # ---- Database Secret ----
# In production, use External Secrets Operator or Sealed Secrets.
# This is base64 encoded for demo purposes.
# echo -n 'yogaw' | base64
# echo -n 'YWluZy1tYWNhbi1rdW1iYW5nMDkwMDk5MDk5OTA5Cg==' | base64
# echo -n 'user-db' | base64 
type: Opaque
data:
  POSTGRES_USER: eW9nYXdzZXRpYXdhbjM0MjM0Cg==
  POSTGRES_PASSWORD: YWluZy1tYWNhbi1rdW1iYW5nMDkwMDk5MDk5OTA5Cg==
  POSTGRES_DB: ZGItZGVtbwo=

---
# Create An Ebs volume for the database data.
apiVersion: v1
kind: StorageClass
metadata:
  name: ebs-sc
  provisioner: ebs.csi.eks.amazonaws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app
  spec:
    accessModes:
      - ReadWriteOnce
    storageClassName: ebs-sc
    resources:
      requests:
        storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app
    app.kubernetes.io/component: database
    app.kubernetes.io/name: web-app-db
  spec:
    replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-app-db
    strategy:
      type: Recreate
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: three-tier-app
          app.kubernetes.io/component: database
          app.kubernetes.io/name: web-app-db
      # Security: don't automount service account token (DB doesn't need K8s API)
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: "karpenter.sh/distrupted"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
      containers: 
        - image: postgres:16
          ports:
            - containerPort: 5432:5432
              protocol: tcp
          envFrom:
            secretKeyRef: db-credentials
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
              subPath: data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true  # Postgres needs write access
            runAsNonRoot: true
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "db-user", "-d", "db-demo"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "db-user", "-d", "db-demo"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app
    app.kubernetes.io/component: database
    app.kubernetes.io/name: web-app-db
spec:
  selector:
    app.kubernetes.io/name: web-app-db
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432            

---

# --------Backend deployment-------------
apiVersion: v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app
    app.kubernetes.io/component: backend
    app.kubernetes.io/name: web-app-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web-app-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: three-tier-app
        app.kubernetes.io/component: backend
        app.kubernetes.io/name: web-app-backend
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: "karpenter.sh/distrupted"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for web-app-db:5432..."
              until nc -z web-app-db 5432; do
                echo "DB not ready, retrying in 3s..."
                sleep 3
              done
              echo "DB is ready!"
      containers:
        - name: backend
          image: ghcr.io/yogasetiawan/Jerney/jerney-backend:75da1da
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: "web-app-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

---
# ---- Backend Service ----
apiVersion: v1
kind: Service
metadata:
  name: backend-deployment
  namespace: three-tier-app
  labels:
    app.kubernetes.io/name: web-app-backend
    app.kubernetes.io/part-of: three-tier-app
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web-app-backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP

---
# --------Frontend deployment-------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-frontend
  namespace: three-tier-app
  labels:
    app.kubernetes.io/name: web-app-frontend
    app.kubernetes.io/part-of: three-tier-app
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web-app-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-app-frontend
        app.kubernetes.io/part-of: three-tier-app
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: "karpenter.sh/disrupted"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: frontend
          image: ghcr.io/yogasetiawan/Jerney/jerney-frontend:75da1da
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 60m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Nginx needs write for cache/pid
            runAsNonRoot: true
            runAsUser: 101 # nginx user UID in alpine
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
# ---- Frontend Service ----
apiVersion: v1
kind: Service
metadata:
  name: frontend-deployment
  namespace: three-tier-app
  labels:
    app.kubernetes.io/name: web-app-frontend
    app.kubernetes.io/part-of: three-tier-app
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: web-app-frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
# ---- Network Policy Backend should allow traffic from Frontend only ----
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: BE-allow-FE-only
  namespace: three-tier-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: web-app-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web-app-frontend
      ports:
        - port: 5000
          protocol: TCP