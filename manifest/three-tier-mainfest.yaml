apiVersion: v1
kind: Namespace
metadata:
  name: three-tier-app
  version: v1
  description: Namespace for the three-tier application
  labels:
    app.kubernetes.io/part-of: three-tier-app
  
---
# In production, use External Secrets Operator or Sealed Secrets.

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app

    # ---- Database Secret ----
# In production, use External Secrets Operator or Sealed Secrets.
# This is base64 encoded for demo purposes.
# echo -n 'yogaw' | base64
# echo -n 'YWluZy1tYWNhbi1rdW1iYW5nMDkwMDk5MDk5OTA5Cg==' | base64
# echo -n 'user-db' | base64 
type: Opaque
data:
  POSTGRES_USER: eW9nYXdzZXRpYXdhbjM0MjM0Cg==
  POSTGRES_PASSWORD: YWluZy1tYWNhbi1rdW1iYW5nMDkwMDk5MDk5OTA5Cg==
  POSTGRES_DB: ZGItZGVtbwo=

---
# Create An Ebs volume for the database data.
apiVersion: v1
kind: StorageClass
metadata:
  name: ebs-sc
  provisioner: ebs.csi.eks.amazonaws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app
  spec:
    accessModes:
      - ReadWriteOnce
    storageClassName: ebs-sc
    resources:
      requests:
        storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app
    app.kubernetes.io/component: database
    app.kubernetes.io/name: web-app-db
  spec:
    replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-app-db
    strategy:
      type: Recreate
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: three-tier-app
          app.kubernetes.io/component: database
          app.kubernetes.io/name: web-app-db
      # Security: don't automount service account token (DB doesn't need K8s API)
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: "karpenter.sh/distrupted"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
      containers: 
        - image: postgres:16
          ports:
            - containerPort: 5432:5432
              protocol: tcp
          envFrom:
            secretKeyRef: db-credentials
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
              subPath: data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true  # Postgres needs write access
            runAsNonRoot: true
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "db-user", "-d", "db-demo"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "db-user", "-d", "db-demo"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: three-tier-app
  labels:
    app.kubernetes.io/part-of: three-tier-app
    app.kubernetes.io/component: database
    app.kubernetes.io/name: web-app-db
spec:
  selector:
    app.kubernetes.io/name: web-app-db
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432            